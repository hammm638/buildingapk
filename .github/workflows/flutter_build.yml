name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project Flutter"
        required: true

      tag:
        description: "Tag build"
        required: true

      build_type:
        description: "debug / release"
        required: true
        default: "release"
        
      only_analyze:
        description: "Hanya jalankan analyze (true/false)"
        required: false
        default: "false"
      
      upload_to_release:
        description: "Upload ke GitHub Release (true/false)"
        required: false
        default: "false"
      
      upload_to_gdrive:
        description: "Upload ke Google Drive (true/false)"
        required: false
        default: "false"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    steps:

      # =========================
      # NODE.JS
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # =========================
      # DOWNLOAD ZIP
      # =========================
      - name: Download ZIP project
        run: |
          echo "=== Downloading ZIP ==="
          echo "URL: ${{ github.event.inputs.zip_url }}"

          curl -L \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${{ github.event.inputs.zip_url }}" \
            -o project.zip \
            -w "\n=== HTTP Status: %{http_code} ===\n=== Final URL: %{url_effective} ===\n"

          echo ""
          echo "=== File Info ==="
          ls -lh project.zip

          echo ""
          echo "=== File Type ==="
          file project.zip

          echo ""
          echo "=== First Bytes ==="
          xxd project.zip | head -2

      # =========================
      # EXTRACT ZIP
      # =========================
      - name: Extract ZIP
        run: |
          echo "=== Validating ZIP ==="

          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ File bukan ZIP valid!"
            echo ""
            echo "=== Isi file ==="
            cat project.zip
            exit 1
          fi

          echo "✅ ZIP valid"

          echo ""
          echo "=== Extracting ZIP ==="
          unzip -q project.zip -d project_raw

          echo ""
          echo "=== Isi folder project_raw ==="
          find project_raw | head -50

          echo ""
          echo "=== Mengunci Project Dir (Manut Mode) ==="
          
          SUB_DIR_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type d | wc -l)
          FILE_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type f | wc -l)
          
          if [ "$SUB_DIR_COUNT" -eq 1 ] && [ "$FILE_COUNT" -eq 0 ]; then
            PROJECT_DIR=$(find project_raw -maxdepth 1 -mindepth 1 -type d | head -n 1)
          else
            PROJECT_DIR="project_raw"
          fi

          echo "✅ Project root langsung dikunci di: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      # =========================
      # JAVA
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # =========================
      # FLUTTER
      # =========================
      - name: Setup Flutter
        uses: subosito/flutter-action@main
        with:
          flutter-version: "3.41.9"
          channel: "stable"
          cache: true

      # ==========================================================
      # 🔍 TAHAP ANALYZE — STEP 1: Jalankan & cetak hasil
      # ==========================================================
      - name: Analyze Project Code
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Starting Automated Code Analysis ==="

          if [ -f "pubspec.yaml" ]; then
            echo "🔍 Menjalankan linting via flutter analyze..."

            flutter analyze > analyze_report.txt 2>&1 || true

            echo "[RESULT_ANALYZE]"
            cat analyze_report.txt
            echo "[END_RESULT_ANALYZE]"

            rm -f analyze_report.txt

          else
            echo "☕ Project native / gradlew terdeteksi!"
            echo "[RESULT_ANALYZE]"
            echo "❌ Fitur analyze hanya support project Flutter (pubspec.yaml tidak ditemukan)."
            echo "[END_RESULT_ANALYZE]"
          fi

      # ==========================================================
      # 🔍 TAHAP ANALYZE — STEP 2: Stop workflow jika only_analyze
      # ==========================================================
      - name: Stop if Analyze Only
        if: ${{ github.event.inputs.only_analyze == 'true' }}
        run: |
          echo "Analyze-only mode aktif. Workflow dihentikan di sini."
          exit 1

      # =========================
      # FLUTTER DOCTOR
      # =========================
      - name: Flutter Doctor
        run: flutter doctor

      # ==========================================================
      # 📦 TAHAP DOWNLOAD DEPENDENSI (PUB GET)
      # ==========================================================
      - name: Get dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Running flutter pub get ==="
          if [ -f "pubspec.yaml" ]; then
            timeout 120s flutter pub get || echo "⚠️ Gagal download package karena network server, coba lanjut aja..."
          else
            echo "☕ Bukan project Flutter standar, skip pub get!"
          fi

      # ==========================================================
      # 🚀 TAHAP PEMBAKARAN UTAMA (BUILD APK)
      # ==========================================================
      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Building APK ==="
          echo "Mode: ${{ github.event.inputs.build_type }}"

          if [ -f "pubspec.yaml" ]; then
            echo "🔥 Project Flutter Terdeteksi! Kompilasi via Flutter SDK..."
            flutter build apk --${{ github.event.inputs.build_type }}
            
          else
            echo "☕ Project Native Android Terdeteksi! Bypassing Flutter Core..."
            GRADLE_PATH=$(find . -name "gradlew" | head -n 1)
            
            if [ -z "$GRADLE_PATH" ]; then
              echo "❌ ERROR: File 'gradlew' tidak ditemukan!"
              echo "FAILURE: Build failed with an exception"
              exit 1
            fi
            
            GRADLE_DIR=$(dirname "$GRADLE_PATH")
            cd "$GRADLE_DIR"
            chmod +x gradlew
            
            echo "🚀 Membakar APK menggunakan Gradle Native..."
            if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
              ./gradlew assembleDebug
            else
              ./gradlew assembleRelease
            fi
            cd -
          fi

      # ==========================================================
      # 📊 CHECK APK OUTPUT (dengan ID untuk referensi)
      # ==========================================================
      - name: Check APK Output
        id: check_apk
        run: |
          echo "=== APK Output Scanning (Global Mode) ==="

          echo "Mencari file APK di seluruh direktori..."
          find $GITHUB_WORKSPACE -name "*.apk"

          APK_FOUND=$(find $GITHUB_WORKSPACE -name "*.apk" | head -n 1)

          if [ -z "$APK_FOUND" ]; then
            echo "Error: Berkas biner APK beneran gak dicetak sama sekali oleh compiler."
            exit 1
          fi

          APK_PATH=$(echo "$APK_FOUND" | sed "s|$GITHUB_WORKSPACE/||")

          echo "✅ APK Sukses Ditemukan di Jalur: $APK_PATH"
          
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "APK_FULL_PATH=$APK_FOUND" >> $GITHUB_OUTPUT

          echo ""
          echo "=== APK Size ==="
          ls -lh "$APK_FOUND"

      # ==========================================================
      # 📤 UPLOAD APK (Artifact) - WAJIB, retention 1 hari
      # ==========================================================
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: ${{ env.APK_PATH }}
          retention-days: 1
          if-no-files-found: error

      # ==========================================================
      # 🚀 UPLOAD KE GITHUB RELEASE (Optional)
      # ==========================================================
      - name: Create GitHub Release
        if: ${{ github.event.inputs.upload_to_release == 'true' }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: Release ${{ github.event.inputs.tag }}
          body: |
            ## Build Information
            - **Tag:** ${{ github.event.inputs.tag }}
            - **Type:** ${{ github.event.inputs.build_type }}
            - **Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')
            - **Flutter Version:** 3.41.9
            
            ## Download
            APK file attached below 👇
          files: ${{ steps.check_apk.outputs.APK_FULL_PATH }}
          draft: false
          prerelease: ${{ github.event.inputs.build_type == 'debug' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==========================================================
      # 📤 UPLOAD KE GOOGLE DRIVE (Optional)
      # ==========================================================
      - name: Upload to Google Drive
        if: ${{ github.event.inputs.upload_to_gdrive == 'true' }}
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          filename: ${{ steps.check_apk.outputs.APK_FULL_PATH }}
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          name: app-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}.apk
          mime: application/vnd.android.package-archive

      # ==========================================================
      # 📊 SUMMARY OUTPUT (Fitur Baru dari gabungan)
      # ==========================================================
      - name: Build Summary
        if: always()
        run: |
          echo "========================================="
          echo "📊 BUILD SUMMARY"
          echo "========================================="
          echo "✅ Status: ${{ job.status }}"
          echo "📦 Tag: ${{ github.event.inputs.tag }}"
          echo "🔧 Type: ${{ github.event.inputs.build_type }}"
          echo "📁 APK Path: ${{ env.APK_PATH }}"
          
          if [ "${{ github.event.inputs.upload_to_release }}" = "true" ]; then
            echo "🚀 Upload to Release: YES"
          else
            echo "📦 Upload to Release: NO"
          fi
          
          if [ "${{ github.event.inputs.upload_to_gdrive }}" = "true" ]; then
            echo "☁️ Upload to Google Drive: YES"
          else
            echo "💾 Upload to Google Drive: NO"
          fi
          echo "========================================="
